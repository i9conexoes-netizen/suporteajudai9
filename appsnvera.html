    <style>
        :root {
            --primary: #3b82f6;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-light: #f8fafc;
            --accent: #10b981;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0; padding: 15px;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; padding: 20px 0; border-bottom: 1px solid #334155; margin-bottom: 20px; }

        .search-container { margin-bottom: 30px; position: sticky; top: 10px; z-index: 100; }

        #deviceSearch {
            width: 100%; padding: 15px 20px; border-radius: 12px; border: 2px solid #334155;
            background: var(--card-bg); color: white; font-size: 1rem; box-sizing: border-box; outline: none;
        }

        #deviceSearch:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(59, 130, 246, 0.3); }

        .category-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

        .btn-cat {
            background: var(--card-bg); border: 1px solid #334155; color: white; padding: 25px 10px;
            border-radius: 15px; cursor: pointer; text-align: center; font-weight: 600; transition: 0.2s;
        }

        .btn-cat:hover { background: var(--primary); transform: translateY(-5px); }
        .btn-cat.hidden { display: none; }

        .apps-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }

        .app-card {
            background: #2d3748; padding: 20px; border-radius: 20px; text-align: center;
            cursor: pointer; border: 2px solid transparent; transition: 0.3s;
        }

        .app-card:hover { border-color: var(--accent); background: #334155; }
        .app-card img { width: 80px; height: 80px; border-radius: 18px; margin-bottom: 12px; object-fit: cover; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); z-index: 2000; justify-content: center; align-items: center;
            padding: 10px; backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg); width: 100%; max-width: 500px; padding: 30px;
            border-radius: 25px; position: relative; border: 1px solid #475569; animation: zoomIn 0.3s ease;
        }

        .instrucoes-box {
            background: #0f172a; padding: 20px; border-radius: 15px; margin-top: 15px;
            border-left: 5px solid var(--accent); color: #cbd5e1; font-size: 1rem; line-height: 1.6; white-space: pre-wrap;
            word-break: break-all; /* Garante que links longos não quebrem o layout */
        }

        /* Estilo para os links clicáveis */
        .instrucoes-box a {
            color: var(--primary);
            text-decoration: underline;
            font-weight: bold;
        }

        .close-btn { position: absolute; top: 15px; right: 15px; background: #ef4444; border: none; border-radius: 50%; color: white; width: 35px; height: 35px; cursor: pointer; font-weight: bold; }
        .back-btn { background: #475569; color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; margin-bottom: 20px; font-weight: bold; }

        @keyframes zoomIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) { .category-grid { grid-template-columns: 1fr 1fr; } .apps-container { grid-template-columns: 1fr; } }
    </style>
</head>

    // FUNÇÃO QUE TRANSFORMA TEXTO EM LINK CLICÁVEL
    function linkify(text) {
        const urlPattern = /(\b(https?|ftp|file):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig;
        return text.replace(urlPattern, '<a href="$1" target="_blank">$1</a>');
    }

    function loadCategories() {
        const grid = document.getElementById('mainCategories');
        grid.innerHTML = '';
        Object.keys(devices).forEach(name => {
            grid.innerHTML += `<button class="btn-cat" onclick="openDevice('${name}')">${name}</button>`;
        });
    }

    function filterDevices() {
        const input = document.getElementById('deviceSearch').value.toLowerCase();
        const btns = document.getElementsByClassName('btn-cat');
        for (let btn of btns) {
            btn.classList.toggle('hidden', !btn.innerText.toLowerCase().includes(input));
        }
    }

    function openDevice(name) {
        document.getElementById('categoryMenu').style.display = 'none';
        document.getElementById('searchWrapper').style.display = 'none';
        document.getElementById('appsView').style.display = 'block';
        document.getElementById('currentDeviceTitle').innerText = name;
        const list = document.getElementById('appsList');
        list.innerHTML = '';
        devices[name].forEach(app => {
            const dataStr = JSON.stringify(app).replace(/'/g, "&apos;");
            list.innerHTML += `
                <div class="app-card" onclick='openModal(${dataStr})'>
                    <img src="${app.img}">
                    <div style="font-weight:bold">${app.name}</div>
                    <div style="font-size:0.8rem; color:var(--primary); margin-top:5px">Ver Tutorial</div>
                </div>
            `;
        });
        window.scrollTo(0,0);
    }

    function showCategories() {
        document.getElementById('categoryMenu').style.display = 'block';
        document.getElementById('searchWrapper').style.display = 'block';
        document.getElementById('appsView').style.display = 'none';
    }

    function openModal(app) {
        const body = document.getElementById('modalBody');
        // AQUI APLICAMOS O LINKIFY NO APP.INFO
        const infoComLinks = linkify(app.info);

        body.innerHTML = `
            <div style="text-align:center">
                <img src="${app.img}" style="width:90px; border-radius:20px; border:2px solid var(--primary);">
                <h2 style="margin:10px 0; color:var(--primary)">${app.name}</h2>
            </div>
            <p style="margin-top:20px;"><b>📖 Passo a Passo:</b></p>
            <div class="instrucoes-box">${infoComLinks}</div>
            <button class="btn-cat" style="width:100%; margin-top:20px; background:var(--accent)" onclick="closeModal()">CONCLUÍDO</button>
        `;
        document.getElementById('modalApp').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modalApp').style.display = 'none'; }
    window.onclick = function(e) { if(e.target.className === 'modal-overlay') closeModal(); }
