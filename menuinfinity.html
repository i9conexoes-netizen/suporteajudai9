<script>
    function trackClick(event, itemName) {
        // Não usamos mais 'async' nem 'await' para não segurar o usuário
        const targetUrl = event.currentTarget.href;
        const isBlank = event.currentTarget.target === "_blank";
        const webhookUrl = "https://discord.com/api/webhooks/1498456727790817374/HwWtSSNVPJ1Bgh4JRRhTNd74FKJz79hia2lKUFPZzAtT4emE5l8xUEZySIO_Mnu2FeKr";

        // Coleta rápida de dados (sem esperar IP externo para ser mais veloz)
        // Se quiser o IP, o envio pode demorar +500ms. 
        // Aqui enviamos o que temos na mão agora:
        const data = {
            embeds: [{
                title: "⚡ Clique Instantâneo",
                color: 16776960, // Amarelo
                fields: [
                    { name: "Opção", value: itemName, inline: true },
                    { name: "Plataforma", value: navigator.platform, inline: true },
                    { name: "Dispositivo", value: navigator.userAgent }
                ],
                footer: { text: "Enviado em background" },
                timestamp: new Date().toISOString()
            }]
        };

        // O SEGREDO: 'keepalive: true' permite que a requisição continue 
        // mesmo que o usuário saia da página na mesma hora.
        fetch(webhookUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
            keepalive: true 
        });

        // O usuário é liberado IMEDIATAMENTE
        return true; 
    }
</script>
