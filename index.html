<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inove - Painel de Suporte</title>
    <style>
        :root {
            --primary: #0066ff;
            --bg: #050505;
            --card: #121212;
            --text: #ffffff;
            --accent-infinity: #0066ff;
            --accent-novaera: #8b5cf6;
            --accent-blackbox: #555555;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #0066ff15 0%, transparent 80%);
        }

        .portal-container {
            width: 100%;
            max-width: 1100px;
            padding: 40px 20px;
            text-align: center;
        }

        .logo-area h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        .logo-area span {
            color: var(--primary);
        }

        .logo-area p {
            color: #888;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        .grid-servidores {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .card-servidor {
            background: var(--card);
            border: 1px solid #222;
            border-radius: 24px;
            padding: 50px 30px;
            text-decoration: none;
            color: white;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .card-servidor:hover {
            transform: translateY(-15px);
            background: #181818;
            border-color: var(--primary);
            box-shadow: 0 20px 40px rgba(0, 102, 255, 0.15);
        }

        .icon-box {
            font-size: 4rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.1));
        }

        .card-servidor h2 {
            font-size: 2rem;
            margin: 10px 0;
            font-weight: 700;
        }

        .card-servidor p {
            color: #666;
            font-size: 0.95rem;
        }

        /* Cores atualizadas dos cards */
        .infinity:hover { border-color: var(--accent-infinity); }
        .infinity:hover h2 { color: var(--accent-infinity); }
        .infinity:hover .btn-acessar { 
            background: var(--accent-infinity); 
            border-color: var(--accent-infinity); 
        }

        .novaera:hover { border-color: var(--accent-novaera); }
        .novaera:hover h2 { color: var(--accent-novaera); }
        .novaera:hover .btn-acessar { 
            background: var(--accent-novaera); 
            border-color: var(--accent-novaera); 
        }

        .blackbox:hover { border-color: var(--accent-blackbox); }
        .blackbox:hover h2 { color: #fff; }
        .blackbox:hover .btn-acessar { 
            background: var(--accent-blackbox); 
            border-color: var(--accent-blackbox); 
        }

        .btn-acessar {
            margin-top: 25px;
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 25px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        @media (max-width: 600px) {
            .logo-area h1 { font-size: 2.2rem; }
            .grid-servidores { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="portal-container">
        <div class="logo-area">
            <h1>Inove <span>Suporte</span></h1>
            <p>Selecione o servidor para abrir o suporte técnico</p>
        </div>

        <div class="grid-servidores">
            <a href="menuinfinity.html" class="card-servidor infinity">
                <div class="icon-box">♾️</div>
                <h2>INFINITY</h2>
                <p>Suporte Especializado Infinity</p>
                <div class="btn-acessar">Abrir Central</div>
            </a>

            <a href="menunvera.html" class="card-servidor novaera">
                <div class="icon-box">🚀</div>
                <h2>NOVA ERA</h2>
                <p>Suporte Especializado Nova Era</p>
                <div class="btn-acessar">Abrir Central</div>
            </a>

            <a href="menublackbox.html" class="card-servidor blackbox">
                <div class="icon-box">⬛</div>
                <h2>BLACK BOX</h2>
                <p>Suporte Especializado Black Box</p>
                <div class="btn-acessar">Abrir Central</div>
            </a>
        </div>
    </div>

    <script>
        // Função para gerar ID único de sessão
        function gerarSessionID() {
            return 'sess_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now().toString(36);
        }

        // Recupera ou cria um ID de sessão único
        function getSessionID() {
            let sessionID = sessionStorage.getItem('inove_session_id');
            if (!sessionID) {
                sessionID = gerarSessionID();
                sessionStorage.setItem('inove_session_id', sessionID);
            }
            return sessionID;
        }

        // Função melhorada para identificar o dispositivo
        function identificarDispositivo(userAgent) {
            const ua = userAgent.toLowerCase();
            let dispositivo = 'Desconhecido';
            let detalhes = '';

            // Android com modelo específico
            if (ua.includes('android')) {
                // Tenta extrair o modelo do Android
                const modelMatch = ua.match(/android\s[\d.]+;\s([^;)]+)/i);
                const modelo = modelMatch ? modelMatch[1].trim() : 'Modelo não identificado';
                
                // Detecta marcas específicas
                if (ua.includes('samsung') || modelo.toLowerCase().includes('sm-')) {
                    dispositivo = '📱 Samsung Galaxy';
                    // Extrai modelo específico Samsung
                    const samsungMatch = ua.match(/(sm-[a-z0-9]+)/i);
                    detalhes = samsungMatch ? samsungMatch[1].toUpperCase() : modelo;
                } else if (ua.includes('motorola') || modelo.toLowerCase().includes('moto')) {
                    dispositivo = '📱 Motorola';
                    const motoMatch = ua.match(/(moto\s?[a-z0-9]+)/i);
                    detalhes = motoMatch ? motoMatch[1] : modelo;
                } else if (ua.includes('xiaomi') || modelo.toLowerCase().includes('mi ')) {
                    dispositivo = '📱 Xiaomi';
                    const xiaomiMatch = ua.match(/(mi\s?\d+[a-z]*|redmi\s?\d+[a-z]*|poco\s?[a-z0-9]+)/i);
                    detalhes = xiaomiMatch ? xiaomiMatch[1] : modelo;
                } else if (ua.includes('lg')) {
                    dispositivo = '📱 LG';
                    detalhes = modelo;
                } else if (ua.includes('huawei')) {
                    dispositivo = '📱 Huawei';
                    detalhes = modelo;
                } else if (ua.includes('oneplus')) {
                    dispositivo = '📱 OnePlus';
                    detalhes = modelo;
                } else {
                    dispositivo = '📱 Android';
                    detalhes = modelo;
                }
            }
            // iPhone com modelo
            else if (ua.includes('iphone')) {
                dispositivo = '📱 iPhone';
                // Tenta identificar versão do iPhone (aproximado pela resolução)
                if (ua.includes('iphone os 17') || ua.includes('iphone os 16')) {
                    detalhes = 'iPhone 14/15 (iOS recente)';
                } else if (ua.includes('iphone os 15')) {
                    detalhes = 'iPhone 12/13 (iOS 15)';
                } else {
                    detalhes = 'iPhone (modelo anterior)';
                }
            }
            // iPad
            else if (ua.includes('ipad')) {
                dispositivo = '📱 iPad';
                detalhes = 'Apple iPad';
            }
            // Windows
            else if (ua.includes('windows')) {
                dispositivo = '💻 Windows';
                if (ua.includes('windows nt 10')) detalhes = 'Windows 10/11';
                else if (ua.includes('windows nt 6.3')) detalhes = 'Windows 8.1';
                else if (ua.includes('windows nt 6.1')) detalhes = 'Windows 7';
                else detalhes = 'Windows';
            }
            // Mac
            else if (ua.includes('macintosh') || ua.includes('mac os')) {
                dispositivo = '💻 macOS';
                detalhes = 'Apple Mac';
            }
            // Linux
            else if (ua.includes('linux')) {
                dispositivo = '💻 Linux';
                detalhes = 'Linux Desktop';
            }

            return { dispositivo, detalhes };
        }

        // Função para identificar o navegador
        function identificarNavegador(userAgent) {
            const ua = userAgent.toLowerCase();
            let navegador = 'Desconhecido';
            
            if (ua.includes('chrome') && !ua.includes('edg') && !ua.includes('opr')) {
                navegador = '🌐 Chrome';
            } else if (ua.includes('firefox')) {
                navegador = '🦊 Firefox';
            } else if (ua.includes('safari') && !ua.includes('chrome')) {
                navegador = '🧭 Safari';
            } else if (ua.includes('edg')) {
                navegador = '🔷 Edge';
            } else if (ua.includes('opr') || ua.includes('opera')) {
                navegador = '🔴 Opera';
            } else if (ua.includes('samsungbrowser')) {
                navegador = '📱 Samsung Browser';
            }
            
            return navegador;
        }

        // Função principal para disparar o webhook
        function dispararWebhook(servidor, emoji, cor) {
            const webhookURL = "https://discord.com/api/webhooks/1494326087847641149/Wyk74HHzUDhmldJBj_VdqmtipqJCHEU4t4wzehaSMMLCI15iGJz39Z3TEMkodK19lRqi";
            
            const userAgent = navigator.userAgent;
            const sessionID = getSessionID();
            const dispositivo = identificarDispositivo(userAgent);
            const navegador = identificarNavegador(userAgent);
            const resolucao = `${window.screen.width}x${window.screen.height}`;
            const idioma = navigator.language || 'pt-BR';
            const horaLocal = new Date().toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' });

            const payload = {
                username: "Inove Spy - Monitoramento",
                avatar_url: "https://cdn-icons-png.flaticon.com/512/889/889518.png",
                embeds: [{
                    title: "🔔 Novo Acesso Detectado",
                    color: cor,
                    fields: [
                        { 
                            name: "🎯 Servidor Selecionado", 
                            value: `${emoji} **${servidor}**`, 
                            inline: true 
                        },
                        { 
                            name: "📱 Dispositivo", 
                            value: `${dispositivo.dispositivo}\n*${dispositivo.detalhes}*`, 
                            inline: true 
                        },
                        { 
                            name: "🌐 Navegador", 
                            value: navegador, 
                            inline: true 
                        },
                        { 
                            name: "📐 Resolução da Tela", 
                            value: resolucao, 
                            inline: true 
                        },
                        { 
                            name: "🌍 Idioma", 
                            value: idioma, 
                            inline: true 
                        },
                        { 
                            name: "🕐 Data/Hora (BR)", 
                            value: horaLocal, 
                            inline: true 
                        },
                        { 
                            name: "🆔 ID da Sessão", 
                            value: `\`${sessionID}\``, 
                            inline: false 
                        },
                        { 
                            name: "📋 User Agent Completo", 
                            value: `\`\`\`${userAgent}\`\`\``, 
                            inline: false 
                        }
                    ],
                    footer: { 
                        text: "Inove Monitoramento • Sistema Anti-Fraude" 
                    },
                    timestamp: new Date().toISOString()
                }]
            };

            // Envia o webhook
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload),
                keepalive: true 
            }).catch(error => console.log('Webhook enviado'));
        }

        // Adiciona o evento em todos os cards
        document.querySelectorAll('.card-servidor').forEach(card => {
            card.addEventListener('click', function(e) {
                const nomeServidor = this.querySelector('h2').innerText;
                const emoji = this.querySelector('.icon-box').innerText;
                
                let cor;
                if (nomeServidor === 'INFINITY') cor = 3447003;      // 🔵 Azul
                else if (nomeServidor === 'NOVA ERA') cor = 9110271;  // 🟣 Roxo
                else cor = 16777215;                                   // ⬜ Branco

                dispararWebhook(nomeServidor, emoji, cor);
            });
        });
    </script>

</body>
</html>
