<script>
    async function notificarClique(servidor, emoji, cor) {
        const webhookURL = "https://discord.com/api/webhooks/1494326087847641149/Wyk74HHzUDhmldJBj_VdqmtipqJCHEU4t4wzehaSMMLCI15iGJz39Z3TEMkodK19lRqi";
        
        const payload = {
            username: "Inove Suporte - Monitor",
            avatar_url: "https://cdn-icons-png.flaticon.com/512/889/889518.png",
            embeds: [{
                title: "🔔 Novo Acesso ao Suporte",
                description: `Um revendedor clicou para abrir a central do servidor **${servidor}**.`,
                color: cor,
                fields: [
                    { name: "Servidor Selecionado", value: `${emoji} ${servidor}`, inline: true },
                    { name: "Horário", value: new Date().toLocaleString('pt-BR'), inline: true }
                ],
                footer: { text: "Sistema Inove - Monitoramento em Tempo Real" }
            }]
        };

        try {
            // Envia para o Discord sem travar a navegação do usuário
            fetch(webhookURL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        } catch (error) {
            console.error('Erro ao enviar webhook:', error);
        }
    }

    // Adiciona o evento de clique em todos os cards
    document.querySelectorAll('.card-servidor').forEach(card => {
        card.addEventListener('click', function(e) {
            const nomeServidor = this.querySelector('h2').innerText;
            const emoji = this.querySelector('.icon-box').innerText;
            
            // Define a cor do Embed baseada no servidor
            let cor;
            if (nomeServidor === 'INFINITY') cor = 9133302;   // Roxo
            else if (nomeServidor === 'NOVA ERA') cor = 54527; // Azul/Ciano
            else cor = 3355443;                               // Cinza Escuro (Black Box)

            notificarClique(nomeServidor, emoji, cor);
        });
    });
</script>
