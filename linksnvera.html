<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Era - Links de Acesso</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }
        h1 {
            color: #333;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }
        .link-button {
            display: block;
            text-decoration: none;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .painel {
            background-color: #007bff;
            color: white;
        }
        .painel:hover {
            background-color: #0056b3;
            transform: scale(1.02);
        }
        .whatsapp {
            background-color: #25d366;
            color: white;
        }
        .whatsapp:hover {
            background-color: #128c7e;
            transform: scale(1.02);
        }
        footer {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Central de Acesso</h1>
        
        <a href="https://novaera.painelr.top/login" target="_blank" class="link-button painel">
            Acessar Painel
        </a>

        <a href="https://chat.whatsapp.com/EGAQuzxKdquDLm5HAfWHRy" target="_blank" class="link-button whatsapp">
            Grupo do WhatsApp
        </a>

        <footer>
            &copy; 2026 Nova Era
        </footer>
    </div>

</body>
</html>
